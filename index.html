<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>中国古代建筑成就 - 时空可视化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', '思源宋体', 'Noto Serif SC', '宋体', 'Times New Roman', serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .homepage-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('homepage/首页.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            transition: all 1s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .homepage-container.blur {
            filter: blur(10px);
            transform: scale(1.05);
        }

        .homepage-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease-in-out;
        }

        .homepage-content h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            letter-spacing: 4px;
            animation: fadeInDown 1s ease-out;
        }

        .homepage-content p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .enter-button {
            background-color: rgba(194, 59, 34, 0.8);
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .enter-button:hover {
            background-color: rgba(194, 59, 34, 1);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(194, 59, 34, 0.4);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .homepage-content h1 {
                font-size: 2rem;
            }
            
            .homepage-content p {
                font-size: 1rem;
            }
            
            .enter-button {
                padding: 10px 25px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="homepage-container" id="homepageContainer">
        <div class="homepage-content">
            <h1>🏯 中国古代建筑成就</h1>
            <p>探索千年营造智慧，感受东方建筑之美</p>
            <button class="enter-button" id="enterButton">进入详情</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('homepageContainer');
        const enterButton = document.getElementById('enterButton');
        let isTransitioning = false;

        function enterMainPage() {
            if (isTransitioning) {
                console.log('已经在跳转中...');
                return;
            }
            isTransitioning = true;
            
            console.log('开始跳转，添加虚化效果...');
            
            // 添加虚化效果
            container.classList.add('blur');
            
            // 显示加载提示
            const loadingDiv = document.createElement('div');
            loadingDiv.innerHTML = '正在加载...';
            loadingDiv.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.8);
                color: white;
                padding: 20px 40px;
                border-radius: 10px;
                font-size: 18px;
                z-index: 9999;
            `;
            document.body.appendChild(loadingDiv);
            
            // 延迟后跳转到主详情页
            console.log('1 秒后跳转到 dashboard.html...');
            setTimeout(() => {
                console.log('执行跳转：window.location.href = "dashboard.html"');
                window.location.href = 'dashboard.html';
            }, 1000);
        }

        // 为容器添加点击事件
        container.addEventListener('click', function(e) {
            console.log('容器被点击');
            // 如果点击的是按钮，不处理（按钮有自己的事件）
            if (e.target === enterButton) {
                console.log('点击的是按钮，跳过');
                return;
            }
            enterMainPage();
        });

        // 按钮点击事件
        enterButton.addEventListener('click', function(e) {
            console.log('按钮被点击');
            e.stopPropagation();
            enterMainPage();
        });

        console.log('首页脚本加载完成，事件监听器已设置');
    </script>
</body>
</html>
